<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            color: #f9fafb;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #f59e0b;
        }

        h2 {
            margin-top: 10px;
            font-size: 32px;
        }

        p {
            margin-top: 15px;
            color: #d1d5db;
            font-size: 18px;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;

            background-color: #2563eb;
            color: white;

            text-decoration: none;
            border-radius: 8px;

            transition: background-color 0.2s ease;
        }

        a:hover {
            background-color: #1d4ed8;
        }

        .code {
            margin-top: 20px;
            color: #9ca3af;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>500</h1>

        <h2>Internal Server Error</h2>

        <p>
            Something went wrong on the server.
            Please try again later.
        </p>

        <a href="/">
            Return Home
        </a>

        <div class="code">
            Error Code: 500
        </div>
    </div>
</body>
</html>
