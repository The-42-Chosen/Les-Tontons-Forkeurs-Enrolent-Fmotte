<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #ef4444;
        }

        h2 {
            margin-top: 10px;
            font-size: 32px;
        }

        p {
            margin-top: 15px;
            color: #cbd5e1;
            font-size: 18px;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;

            background-color: #2563eb;
            color: white;

            text-decoration: none;
            border-radius: 8px;

            transition: background-color 0.2s ease;
        }

        a:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>

        <h2>Page Not Found</h2>

        <p>
            The page you are looking for does not exist.
        </p>

        <a href="/">
            Return Home
        </a>
    </div>
</body>
</html>
